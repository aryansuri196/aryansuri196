<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Page</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Georgia, serif;
      color: #fff9f5;
      background:
        radial-gradient(circle at 50% 82%, rgba(255, 196, 118, 0.34) 0%, rgba(255, 196, 118, 0.12) 22%, transparent 48%),
        radial-gradient(circle at 18% 18%, rgba(255, 232, 194, 0.16) 0%, transparent 26%),
        linear-gradient(180deg, #81a7d9 0%, #9fc0e4 26%, #c7d3ea 48%, #efc1ad 76%, #e9b67c 100%);
    }

    .panel {
      width: min(92vw, 780px);
      padding: 2.4rem;
      border-radius: 28px;
      background: rgba(95, 51, 64, 0.22);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 243, 236, 0.28);
      box-shadow: 0 24px 50px rgba(66, 33, 44, 0.18);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 600;
    }

    p {
      margin: 0 auto;
      max-width: 34ch;
      line-height: 1.6;
      font-size: clamp(1rem, 1.6vw, 1.12rem);
      color: rgba(255, 249, 245, 0.92);
    }

    a {
      display: inline-block;
      margin-top: 1.4rem;
      padding: 0.85rem 1.25rem;
      border-radius: 999px;
      color: #fffaf6;
      text-decoration: none;
      background: rgba(104, 56, 69, 0.34);
      border: 1px solid rgba(255, 243, 236, 0.28);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Linked Garden Page</h1>
    <p>This is the second page your pots open. You can replace this with any content you want next.</p>
  </main>
</body>
</html>
