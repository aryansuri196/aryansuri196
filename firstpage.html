<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cherry Blossom Branch Wind</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7d8e7;
    }

    body {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 78%, rgba(255, 196, 148, 0.18) 0%, rgba(255, 196, 148, 0.06) 24%, transparent 50%),
        linear-gradient(180deg, #f0b7c4 0%, #f3becb 22%, #efbcc9 54%, #e9b8c7 76%, #dcbdd6 100%);
      transition: background 420ms ease;
    }

    body::before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      height: 12vh;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 75%, rgba(255, 223, 230, 0.34) 0%, transparent 26%),
        radial-gradient(circle at 78% 72%, rgba(255, 219, 228, 0.32) 0%, transparent 24%),
        linear-gradient(180deg, #f1b6c4 0%, #f4c0cc 26%, #f1beca 70%, #f0c2cd 100%);
      transition: background 420ms ease;
    }

    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      top: 3.6vh;
      height: 10vh;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(249, 206, 216, 0.88) 0%, rgba(249, 206, 216, 0.56) 22%, rgba(249, 206, 216, 0.16) 56%, transparent 100%);
      mix-blend-mode: screen;
      transition: background 420ms ease;
    }

    .top-strip-title {
      position: fixed;
      top: 1.4vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
      font-family: Georgia, serif;
      font-size: clamp(1.5rem, 2.1vw, 2.3rem);
      font-weight: 800;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #5b88d9;
      text-shadow:
        0 1px 0 rgba(255, 238, 246, 0.45),
        0 8px 20px rgba(91, 136, 217, 0.16);
      transition: color 420ms ease, text-shadow 420ms ease;
    }

    .night-toggle {
      position: fixed;
      top: 1vh;
      right: 1rem;
      width: clamp(42px, 4vw, 56px);
      aspect-ratio: 1;
      padding: 0;
      border: none;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 244, 248, 0.18);
      backdrop-filter: blur(10px);
      box-shadow:
        0 10px 24px rgba(79, 43, 62, 0.2),
        inset 0 0 0 1px rgba(255, 246, 250, 0.3);
      cursor: pointer;
      z-index: 7;
      transition: transform 180ms ease, box-shadow 220ms ease, background 220ms ease;
    }

    .night-toggle:hover,
    .night-toggle:focus-visible {
      transform: translateY(-2px) scale(1.04);
      box-shadow:
        0 14px 28px rgba(79, 43, 62, 0.26),
        inset 0 0 0 1px rgba(255, 246, 250, 0.38);
    }

    .night-toggle:focus-visible {
      outline: 2px solid rgba(255, 249, 252, 0.92);
      outline-offset: 2px;
    }

    .night-toggle img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.02);
    }

    .scene-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      transform: translateY(4vh);
      transform-origin: center;
      transition: transform 420ms ease;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      filter: saturate(1.08) contrast(1.03) brightness(0.95) sepia(0.08) hue-rotate(-8deg);
      transition: filter 420ms ease;
    }

    .sunset-atmosphere {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .sunset-atmosphere::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 78%, rgba(255, 196, 154, 0.22) 0%, rgba(255, 196, 154, 0.12) 18%, rgba(255, 170, 186, 0.08) 34%, transparent 58%),
        linear-gradient(180deg, rgba(245, 192, 206, 0.24) 0%, rgba(246, 205, 215, 0.18) 18%, rgba(255, 188, 194, 0.1) 46%, rgba(146, 131, 186, 0.12) 100%);
      mix-blend-mode: screen;
      opacity: 0.92;
      transition: background 420ms ease, opacity 420ms ease;
    }

    .sunset-atmosphere::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 86%, rgba(255, 154, 102, 0.2) 0%, transparent 42%),
        radial-gradient(circle at 14% 14%, rgba(255, 208, 166, 0.08) 0%, transparent 30%),
        linear-gradient(180deg, rgba(96, 68, 109, 0.06) 0%, transparent 18%, transparent 64%, rgba(71, 48, 76, 0.18) 100%);
      mix-blend-mode: multiply;
      opacity: 0.78;
      transition: background 420ms ease, opacity 420ms ease;
    }

    body.night {
      background:
        radial-gradient(circle at 50% 78%, rgba(121, 141, 206, 0.12) 0%, rgba(121, 141, 206, 0.04) 24%, transparent 50%),
        linear-gradient(180deg, #16233f 0%, #1f3054 24%, #2a3f67 54%, #30456a 76%, #2d3858 100%);
    }

    body.night::before {
      background:
        radial-gradient(circle at 20% 75%, rgba(162, 187, 236, 0.16) 0%, transparent 26%),
        radial-gradient(circle at 78% 72%, rgba(149, 176, 228, 0.16) 0%, transparent 24%),
        linear-gradient(180deg, #172642 0%, #21365c 26%, #274067 70%, #30486d 100%);
    }

    body.night::after {
      background:
        linear-gradient(180deg, rgba(115, 140, 193, 0.4) 0%, rgba(115, 140, 193, 0.18) 22%, rgba(115, 140, 193, 0.05) 56%, transparent 100%);
    }

    body.night .top-strip-title {
      color: #dce9ff;
      text-shadow:
        0 1px 0 rgba(56, 77, 119, 0.45),
        0 10px 22px rgba(140, 180, 255, 0.18);
    }

    body.night .night-toggle {
      background: rgba(36, 52, 86, 0.42);
      box-shadow:
        0 14px 28px rgba(10, 16, 31, 0.34),
        inset 0 0 0 1px rgba(207, 225, 255, 0.18);
    }

    body.night .scene {
      filter: saturate(0.74) contrast(1.08) brightness(0.5) hue-rotate(18deg);
    }

    body.night .sunset-atmosphere::before {
      background:
        radial-gradient(circle at 50% 78%, rgba(126, 149, 214, 0.14) 0%, rgba(126, 149, 214, 0.08) 18%, rgba(95, 116, 176, 0.05) 34%, transparent 58%),
        linear-gradient(180deg, rgba(98, 127, 184, 0.18) 0%, rgba(93, 121, 173, 0.14) 18%, rgba(51, 66, 112, 0.08) 46%, rgba(24, 33, 58, 0.18) 100%);
      opacity: 0.9;
    }

    body.night .sunset-atmosphere::after {
      background:
        radial-gradient(circle at 50% 86%, rgba(48, 67, 112, 0.24) 0%, transparent 42%),
        radial-gradient(circle at 14% 14%, rgba(194, 210, 242, 0.05) 0%, transparent 30%),
        linear-gradient(180deg, rgba(12, 18, 33, 0.24) 0%, transparent 18%, transparent 64%, rgba(6, 9, 18, 0.42) 100%);
      opacity: 0.92;
    }

    .branch-rig {
      transform-box: fill-box;
      transform-origin: center;
      animation-timing-function: cubic-bezier(0.42, 0.0, 0.22, 1);
      animation-iteration-count: infinite;
      animation-direction: alternate;
      will-change: transform;
    }

    .sway-left-deep {
      animation-name: swayLeftDeep;
    }

    .sway-left-soft {
      animation-name: swayLeftSoft;
    }

    .sway-right-deep {
      animation-name: swayRightDeep;
    }

    .sway-right-soft {
      animation-name: swayRightSoft;
    }

    .sway-center {
      animation-name: swayCenter;
    }

    .sway-far {
      animation-name: swayFar;
    }

    .blossom-depth {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .blossom-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .pot-board {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 5;
      pointer-events: none;
    }


    .pot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: clamp(18px, 2vw, 28px) clamp(20px, 2.4vw, 34px);
      width: min(32vw, 360px);
    }

    .pot-link {
      display: block;
      pointer-events: auto;
      text-decoration: none;
      color: inherit;
      outline: none;
      border-radius: 20px;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .pot-link:hover,
    .pot-link:focus-visible {
      transform: translateY(-4px) scale(1.02);
      filter: drop-shadow(0 10px 18px rgba(61, 29, 16, 0.18));
    }

    .pot-link:focus-visible {
      box-shadow: 0 0 0 2px rgba(255, 242, 233, 0.9);
    }

    .pot-card {
      position: relative;
      aspect-ratio: 1 / 1.45;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      perspective: 900px;
    }

    .pot-plant {
      position: absolute;
      left: 50%;
      bottom: 36%;
      width: 55%;
      height: 58%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 10%;
      width: 7%;
      height: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #4f8b33 0%, #2d5c26 100%);
      box-shadow: 0 0 8px rgba(44, 92, 38, 0.18);
    }

    .leaf {
      position: absolute;
      bottom: 24%;
      width: 42%;
      height: 26%;
      background: linear-gradient(135deg, #8fd768 0%, #4f9a40 55%, #326d2b 100%);
      border-radius: 100% 0 100% 0;
      box-shadow: inset -4px -4px 10px rgba(33, 74, 31, 0.18);
    }

    .leaf::after {
      content: "";
      position: absolute;
      left: 48%;
      top: 10%;
      width: 6%;
      height: 80%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(245, 255, 237, 0.4);
    }

    .leaf-left {
      left: 12%;
      transform: rotate(-28deg);
    }

    .leaf-right {
      right: 12%;
      transform: scaleX(-1) rotate(-28deg);
    }

    .leaf-top {
      left: 50%;
      bottom: 50%;
      width: 38%;
      height: 24%;
      transform: translateX(-50%) rotate(-6deg);
      border-radius: 100% 0 100% 0;
    }

    .pot-illustration {
      position: relative;
      width: 100%;
      height: 52%;
      z-index: 3;
      transform: rotateX(8deg);
      transform-style: preserve-3d;
      filter: drop-shadow(0 18px 20px rgba(77, 41, 19, 0.22));
    }

    .pot-illustration::before {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      bottom: -6%;
      height: 12%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(70, 37, 18, 0.34) 0%, rgba(70, 37, 18, 0.15) 54%, transparent 78%);
      filter: blur(8px);
      z-index: 0;
    }

    .pot-rim {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 6%;
      height: 26%;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 232, 216, 0.86) 0%, rgba(255, 232, 216, 0.22) 18%, transparent 24%),
        linear-gradient(180deg, #f6af92 0%, #e08967 40%, #c7674c 100%);
      box-shadow:
        inset 0 -12px 18px rgba(156, 75, 51, 0.3),
        inset 0 10px 12px rgba(255, 227, 214, 0.46),
        0 3px 6px rgba(126, 63, 42, 0.16);
      z-index: 3;
    }

    .pot-rim::before {
      content: "";
      position: absolute;
      left: 3%;
      right: 3%;
      bottom: -8%;
      height: 42%;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(164, 83, 57, 0.3) 0%, rgba(113, 53, 35, 0.18) 100%);
      filter: blur(1px);
      opacity: 0.8;
    }

    .pot-rim::after {
      content: none;
    }

    .pot-body {
      position: absolute;
      left: 12%;
      right: 12%;
      top: 18%;
      bottom: 0;
      clip-path: polygon(9% 0%, 91% 0%, 79% 100%, 21% 100%);
      background:
        radial-gradient(ellipse at 50% 8%, rgba(255, 228, 211, 0.24) 0%, transparent 46%),
        linear-gradient(90deg, rgba(255, 227, 210, 0.24) 0%, transparent 14%, transparent 86%, rgba(114, 53, 34, 0.18) 100%),
        linear-gradient(90deg, #b95f46 0%, #dd8766 16%, #f2aa89 36%, #ee9e7d 52%, #d97e60 74%, #ab583f 100%);
      box-shadow:
        inset 18px 0 22px rgba(255, 214, 195, 0.2),
        inset -18px 0 22px rgba(146, 66, 44, 0.26),
        inset 0 -18px 22px rgba(112, 49, 31, 0.26);
      border-radius: 0 0 22px 22px;
      z-index: 2;
    }

    .pot-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 34% 28%, rgba(255, 239, 229, 0.24) 0%, transparent 24%),
        radial-gradient(ellipse at 50% 54%, rgba(255, 223, 205, 0.12) 0%, transparent 26%),
        radial-gradient(ellipse at 64% 72%, rgba(124, 57, 38, 0.12) 0%, transparent 22%);
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .pot-body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(138, 71, 49, 0.1) 0.8px, transparent 0.8px),
        radial-gradient(rgba(255, 225, 208, 0.08) 0.8px, transparent 0.8px);
      background-size: 16px 16px, 22px 22px;
      background-position: 0 0, 8px 10px;
      mix-blend-mode: multiply;
      opacity: 0.28;
    }

    .pot-body-edge {
      position: absolute;
      left: 22%;
      right: 22%;
      bottom: -1%;
      height: 8%;
      border-radius: 0 0 999px 999px;
      background: linear-gradient(180deg, #aa573f 0%, #7f3d2a 100%);
      box-shadow:
        inset 0 2px 4px rgba(255, 220, 203, 0.16),
        0 2px 4px rgba(77, 37, 21, 0.14);
      z-index: 1;
    }

    .pot-soil {
      display: none;
    }

    @keyframes swayLeftDeep {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      35% {
        transform: translate(-9px, -3px) rotate(-2deg);
      }
      100% {
        transform: translate(7px, 2px) rotate(1.45deg);
      }
    }

    @keyframes swayLeftSoft {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      40% {
        transform: translate(-6px, -2px) rotate(-1.25deg);
      }
      100% {
        transform: translate(4px, 1px) rotate(0.9deg);
      }
    }

    @keyframes swayRightDeep {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      35% {
        transform: translate(9px, -3px) rotate(2deg);
      }
      100% {
        transform: translate(-7px, 2px) rotate(-1.45deg);
      }
    }

    @keyframes swayRightSoft {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      40% {
        transform: translate(6px, -2px) rotate(1.25deg);
      }
      100% {
        transform: translate(-4px, 1px) rotate(-0.9deg);
      }
    }

    @keyframes swayCenter {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      50% {
        transform: translate(3px, -1px) rotate(0.8deg);
      }
      100% {
        transform: translate(-3px, 1px) rotate(-0.65deg);
      }
    }

    @keyframes swayFar {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      50% {
        transform: translate(2px, -1px) rotate(0.45deg);
      }
      100% {
        transform: translate(-2px, 1px) rotate(-0.35deg);
      }
    }

  </style>
</head>

  <script>
    const blossomCanvas = document.getElementById("blossomCanvas");
    const blossomContext = blossomCanvas.getContext("2d", { alpha: true });
    const nightToggle = document.getElementById("nightToggle");
    const blossomCount = 1000;
    const depthMax = 980;
    const leaves = new Array(blossomCount);
    let viewportWidth = 0;
    let viewportHeight = 0;
    let deviceScale = 1;
    let lastTime = performance.now();
    let vanishX = 0;
    let vanishY = 0;

    const leafSprites = Array.from({ length: 5 }, (_, index) => {
      const sprite = document.createElement("canvas");
      sprite.width = 56;
      sprite.height = 56;
      const ctx = sprite.getContext("2d");
      ctx.translate(28, 28);
      ctx.rotate((index - 2) * 0.18);
      ctx.scale(1, 0.86 + index * 0.035);

      const petalGradient = ctx.createLinearGradient(-12, -14, 12, 18);
      petalGradient.addColorStop(0, "rgba(255, 248, 252, 0.98)");
      petalGradient.addColorStop(0.28, "rgba(255, 217, 233, 0.98)");
      petalGradient.addColorStop(0.68, "rgba(247, 170, 199, 0.98)");
      petalGradient.addColorStop(1, "rgba(230, 132, 172, 0.98)");
      ctx.fillStyle = petalGradient;
      ctx.beginPath();
      ctx.moveTo(0, -15);
      ctx.bezierCurveTo(4, -17, 10, -14, 12, -8);
      ctx.bezierCurveTo(14, -1, 10, 8, 2, 15);
      ctx.bezierCurveTo(-1, 18, -4, 18, -7, 15);
      ctx.bezierCurveTo(-14, 8, -18, -1, -15, -8);
      ctx.bezierCurveTo(-12, -14, -5, -17, 0, -15);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 244, 248, 0.52)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.quadraticCurveTo(-1, -1, -2, 12);
      ctx.stroke();

      ctx.globalAlpha = 0.42;
      ctx.fillStyle = "#fff8fb";
      ctx.beginPath();
      ctx.ellipse(-4, -7, 5.5, 2.6, -0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.ellipse(3, 4, 6, 10, 0.4, 0, Math.PI * 2);
      ctx.fill();
      return sprite;
    });


    function resetLeaf(leaf, randomizeDepth = true) {
      leaf.x = Math.random() * viewportWidth;
      leaf.y = Math.random() * viewportHeight;
      leaf.driftX = -26 + Math.random() * 52;
      leaf.driftY = -20 + Math.random() * 40;
      leaf.z = randomizeDepth ? Math.random() * depthMax : 0;
      leaf.speed = 42 + Math.random() * 52;
      leaf.size = 9 + Math.random() * 14;
      leaf.alpha = 0.58 + Math.random() * 0.34;
      leaf.rotation = Math.random() * Math.PI * 2;
      leaf.rotationSpeed = (-0.7 + Math.random() * 1.4) * 0.42;
      leaf.flutterPhase = Math.random() * Math.PI * 2;
      leaf.flutterAmp = 6 + Math.random() * 18;
      leaf.spriteIndex = Math.floor(Math.random() * leafSprites.length);
    }

    function resizeCanvas() {
      deviceScale = Math.min(window.devicePixelRatio || 1, 2);
      viewportWidth = window.innerWidth;
      viewportHeight = window.innerHeight;
      vanishX = viewportWidth * 0.5;
      vanishY = viewportHeight * 0.53;
      blossomCanvas.width = Math.floor(viewportWidth * deviceScale);
      blossomCanvas.height = Math.floor(viewportHeight * deviceScale);
      blossomContext.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);
      blossomContext.imageSmoothingEnabled = true;
    }

    resizeCanvas();

    for (let i = 0; i < blossomCount; i += 1) {
      const leaf = {};
      resetLeaf(leaf, true);
      leaves[i] = leaf;
    }

    window.addEventListener("resize", resizeCanvas);

    function renderLeaves(now) {
      const delta = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      blossomContext.clearRect(0, 0, viewportWidth, viewportHeight);

      for (let i = 0; i < blossomCount; i += 1) {
        const leaf = leaves[i];
        leaf.z += leaf.speed * delta;
        leaf.rotation += leaf.rotationSpeed * delta;

        if (leaf.z >= depthMax) {
          resetLeaf(leaf, false);
        }

        const progress = leaf.z / depthMax;
        const depth = 1 - progress;
        const flutter = Math.sin(now * 0.0014 + leaf.flutterPhase) * leaf.flutterAmp * depth;
        const drawX = leaf.x + (vanishX - leaf.x) * progress + leaf.driftX * depth + flutter;
        const drawY = leaf.y + (vanishY - leaf.y) * progress + leaf.driftY * depth;
        const scale = 0.14 + depth * 1.08;
        const alpha = Math.min(1, leaf.alpha * (0.62 + depth * 0.5));
        if (alpha <= 0.01 || scale <= 0.02) {
          continue;
        }

        const sprite = leafSprites[leaf.spriteIndex];
        const drawWidth = leaf.size * scale * 2.4;
        const drawHeight = leaf.size * scale * 2;

        blossomContext.globalAlpha = alpha;
        blossomContext.save();
        blossomContext.translate(drawX, drawY);
        blossomContext.rotate(leaf.rotation);
        blossomContext.drawImage(sprite, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        blossomContext.restore();
      }

      blossomContext.globalAlpha = 1;
      requestAnimationFrame(renderLeaves);
    }

    requestAnimationFrame(renderLeaves);

    const savedTheme = localStorage.getItem("floral-theme");
    if (savedTheme === "night") {
      document.body.classList.add("night");
    }

    nightToggle.addEventListener("click", () => {
      document.body.classList.toggle("night");
      localStorage.setItem(
        "floral-theme",
        document.body.classList.contains("night") ? "night" : "day"
      );
    });
  </script>
